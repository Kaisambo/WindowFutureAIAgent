<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Окна Будущего — Онлайн-консультант</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 50%, #1e40af 100%);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chat-container {
      width: 100%;
      max-width: 520px;
      height: 100vh;
      background: #fff;
      display: flex;
      flex-direction: column;
      box-shadow: 0 25px 60px rgba(0,0,0,0.3);
    }

    /* Header */
    .chat-header {
      background: linear-gradient(135deg, #1e3a5f, #2563eb);
      color: #fff;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .chat-header-icon {
      width: 46px; height: 46px;
      background: rgba(255,255,255,0.15);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .chat-header-text h1 { font-size: 1.1em; font-weight: 600; }
    .chat-header-text p  { font-size: 0.78em; opacity: 0.8; margin-top: 2px; }

    /* Messages */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #f8fafc;
    }

    .msg {
      max-width: 82%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 0.92em;
      line-height: 1.55;
      word-wrap: break-word;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.bot {
      align-self: flex-start;
      background: #e8f0fe;
      color: #1e293b;
      border-bottom-left-radius: 4px;
    }

    .msg.bot img {
      max-width: 100%;
      border-radius: 10px;
      margin-top: 8px;
      display: block;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .msg.bot img:hover {
      transform: scale(1.02);
    }

    .msg.user {
      align-self: flex-end;
      background: #2563eb;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    /* Typing indicator */
    .msg.typing {
      display: flex;
      gap: 5px;
      padding: 12px 18px;
    }

    .msg.typing span {
      width: 8px; height: 8px;
      background: #94a3b8;
      border-radius: 50%;
      animation: blink 1.4s infinite both;
    }

    .msg.typing span:nth-child(2) { animation-delay: 0.2s; }
    .msg.typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    /* Input area */
    .chat-input-area {
      padding: 12px 14px;
      border-top: 1px solid #e2e8f0;
      background: #fff;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    .chat-input-area textarea {
      flex: 1;
      border: 1.5px solid #e2e8f0;
      border-radius: 22px;
      padding: 10px 16px;
      font-size: 0.92em;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 120px;
      min-height: 42px;
      line-height: 1.4;
      transition: border-color 0.2s;
    }

    .chat-input-area textarea:focus {
      border-color: #2563eb;
    }

    .chat-input-area textarea::placeholder {
      color: #94a3b8;
    }

    .send-btn {
      width: 42px; height: 42px;
      border: none;
      background: #2563eb;
      color: #fff;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .send-btn:hover { background: #1d4ed8; }
    .send-btn:disabled { background: #94a3b8; cursor: not-allowed; }

    .send-btn svg { width: 20px; height: 20px; }

    /* PDF card in chat */
    .pdf-card {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fff;
      border: 1.5px solid #e2e8f0;
      border-radius: 12px;
      padding: 12px 14px;
      margin-top: 8px;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .pdf-card:hover {
      border-color: #2563eb;
      box-shadow: 0 2px 8px rgba(37,99,235,0.12);
    }

    .pdf-card-icon {
      font-size: 28px;
      flex-shrink: 0;
    }

    .pdf-card-info { flex: 1; min-width: 0; }

    .pdf-card-title {
      font-weight: 600;
      font-size: 0.88em;
      color: #1e293b;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pdf-card-subtitle {
      font-size: 0.76em;
      color: #64748b;
      margin-top: 2px;
    }

    .pdf-card-arrow {
      font-size: 18px;
      color: #2563eb;
      flex-shrink: 0;
      font-weight: 600;
    }

    /* PDF modal overlay */
    .pdf-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.6);
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .pdf-modal-content {
      position: relative;
      width: 100%;
      max-width: 800px;
      height: 85vh;
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 25px 60px rgba(0,0,0,0.4);
      display: flex;
      flex-direction: column;
    }

    .pdf-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: linear-gradient(135deg, #1e3a5f, #2563eb);
      color: #fff;
      flex-shrink: 0;
    }

    .pdf-modal-header span {
      font-weight: 600;
      font-size: 0.95em;
    }

    .pdf-modal-close {
      background: rgba(255,255,255,0.15);
      border: none;
      color: #fff;
      width: 34px; height: 34px;
      border-radius: 8px;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .pdf-modal-close:hover { background: rgba(255,255,255,0.3); }

    .pdf-modal iframe {
      flex: 1;
      width: 100%;
      border: none;
    }

    .pdf-modal-actions {
      padding: 10px 16px;
      border-top: 1px solid #e2e8f0;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      flex-shrink: 0;
    }

    .pdf-modal-btn {
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 0.85em;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: background 0.2s;
    }

    .pdf-modal-btn.primary {
      background: #2563eb;
      color: #fff;
    }

    .pdf-modal-btn.primary:hover { background: #1d4ed8; }

    .pdf-modal-btn.secondary {
      background: #f1f5f9;
      color: #475569;
    }

    .pdf-modal-btn.secondary:hover { background: #e2e8f0; }

    /* Desktop */
    @media (min-width: 900px) {
      body { padding: 24px; }
      .chat-container {
        height: calc(100vh - 48px);
        border-radius: 16px;
        overflow: hidden;
      }
    }

    /* Mobile full-screen */
    @media (max-width: 520px) {
      .chat-container { max-width: 100%; }
    }
  </style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">
    <div class="chat-header-icon">🪟</div>
    <div class="chat-header-text">
      <h1>Окна Будущего</h1>
      <p>Окна, двери, балконы, мебель на заказ</p>
    </div>
  </div>

  <div class="chat-messages" id="messages"></div>

  <!-- PDF Modal -->
  <div class="pdf-modal" id="pdfModal" onclick="closePdfModal(event)">
    <div class="pdf-modal-content" onclick="event.stopPropagation()">
      <div class="pdf-modal-header">
        <span>📋 Каталог отделки балконов и лоджий</span>
        <button class="pdf-modal-close" onclick="closePdfModal()" title="Закрыть">✕</button>
      </div>
      <iframe id="pdfFrame" src=""></iframe>
      <div class="pdf-modal-actions">
        <button class="pdf-modal-btn secondary" onclick="closePdfModal()">Закрыть</button>
        <button class="pdf-modal-btn primary" id="pdfDownloadBtn" onclick="window.open(pdfCurrentUrl,'_blank')">Открыть в новой вкладке</button>
      </div>
    </div>
  </div>

  <div class="chat-input-area">
    <textarea id="input" rows="1" placeholder="Напишите ваш вопрос..." autocomplete="off"></textarea>
    <button class="send-btn" id="sendBtn" title="Отправить">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>

<script>
  (function() {
    const WEBHOOK_URL = 'https://n8n.orbitai.ru/webhook/0a536852-5986-40fc-8ebe-b526e469d193/chat';
    const REQUEST_TIMEOUT = 220000; // 2 минуты

    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');

    // Generate unique session ID
    let sessionId = sessionStorage.getItem('chat_session_id');
    if (!sessionId) {
      sessionId = 'sess_' + Date.now() + '_' + Math.random().toString(36).slice(2, 10);
      sessionStorage.setItem('chat_session_id', sessionId);
    }

    let isLoading = false;

    // Show initial bot message
    addMessage('bot', 'Здравствуйте! Меня зовут Степан, менеджер компании «Окна Будущего». Какой у вас вопрос?');

    // Auto-resize textarea
    inputEl.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    // Send on Enter (Shift+Enter for new line)
    inputEl.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    sendBtn.addEventListener('click', sendMessage);

    let pdfCurrentUrl = '';

    function isPdfLink(url) {
      return url.includes('drive.google.com') || url.endsWith('.pdf') || url.includes('/catalog');
    }

    function buildPdfCard(title, url) {
      const safeUrl = url.replace(/'/g, '&#39;');
      return '<div class="pdf-card" onclick="openPdfViewer(\'' + safeUrl + '\')">' +
        '<div class="pdf-card-icon">📋</div>' +
        '<div class="pdf-card-info">' +
        '<div class="pdf-card-title">' + (title || 'Каталог отделки балконов') + '</div>' +
        '<div class="pdf-card-subtitle">Нажмите, чтобы открыть</div>' +
        '</div>' +
        '<div class="pdf-card-arrow">→</div>' +
        '</div>';
    }

    function openPdfViewer(url) {
      pdfCurrentUrl = url;
      let embedUrl = null;

      // Google Drive file: /file/d/ID/... → /file/d/ID/preview
      const fileMatch = url.match(/drive\.google\.com\/file\/d\/([^/]+)/);
      if (fileMatch) {
        embedUrl = 'https://drive.google.com/file/d/' + fileMatch[1] + '/preview';
      }

      // Google Drive folder: /folders/ID → embeddedfolderview
      const folderMatch = url.match(/drive\.google\.com\/drive\/[^/]*\/?(?:folders\/|u\/\d+\/folders\/)([^?#]+)/);
      if (folderMatch) {
        embedUrl = 'https://drive.google.com/embeddedfolderview?id=' + folderMatch[1] + '#grid';
      }

      // Direct PDF URL
      if (url.match(/\.pdf(\?|$)/i)) {
        embedUrl = url;
      }

      if (embedUrl) {
        document.getElementById('pdfModal').style.display = 'flex';
        document.getElementById('pdfFrame').src = embedUrl;
      } else {
        window.open(url, '_blank');
      }
    }

    function closePdfModal(e) {
      if (e && e.target !== e.currentTarget) return;
      document.getElementById('pdfModal').style.display = 'none';
      document.getElementById('pdfFrame').src = '';
    }

    // Close modal on Escape
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closePdfModal();
    });

    function renderMarkdown(text) {
      // Render markdown images: ![alt](url)
      let html = text.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, function(match, alt, url) {
        return '<img src="' + url + '" alt="' + alt + '" loading="lazy" onclick="window.open(this.src,\'_blank\')">';
      });
      // Render markdown links — PDF links get a card, others get a normal link
      html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, function(match, linkText, url) {
        if (isPdfLink(url)) {
          return buildPdfCard(linkText, url);
        }
        return '<a href="' + url + '" target="_blank" style="color:#2563eb">' + linkText + '</a>';
      });
      // Detect raw Google Drive / PDF URLs not already in markdown
      html = html.replace(/(^|[\s>])(https:\/\/drive\.google\.com\/[^\s<]+)/g, function(match, prefix, url) {
        return prefix + buildPdfCard('Каталог отделки балконов', url);
      });
      html = html.replace(/(^|[\s>])(https:\/\/[^\s<]+\.pdf(?:\?[^\s<]*)?)/gi, function(match, prefix, url) {
        return prefix + buildPdfCard('Скачать PDF', url);
      });
      // Render bold: **text**
      html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      // Line breaks
      html = html.replace(/\n/g, '<br>');
      return html;
    }

    function addMessage(role, text) {
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      if (role === 'bot') {
        div.innerHTML = renderMarkdown(text);
      } else {
        div.textContent = text;
      }
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'msg bot typing';
      div.id = 'typing';
      div.innerHTML = '<span></span><span></span><span></span>';
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function hideTyping() {
      const el = document.getElementById('typing');
      if (el) el.remove();
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || isLoading) return;

      // Show user message
      addMessage('user', text);
      inputEl.value = '';
      inputEl.style.height = 'auto';

      // Disable input
      isLoading = true;
      sendBtn.disabled = true;
      inputEl.disabled = true;

      showTyping();

      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), REQUEST_TIMEOUT);

      try {
        const response = await fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'sendMessage',
            chatInput: text,
            sessionId: sessionId
          }),
          signal: controller.signal
        });

        clearTimeout(timeoutId);
        hideTyping();

        if (!response.ok) {
          throw new Error('Ошибка сервера: ' + response.status);
        }

        const data = await response.json();

        // n8n chat trigger returns { output: "..." }
        const botText = data.output || data.text || data.response || JSON.stringify(data);
        addMessage('bot', botText);

      } catch (err) {
        clearTimeout(timeoutId);
        hideTyping();

        if (err.name === 'AbortError') {
          addMessage('bot', 'Время ожидания ответа истекло (2 минуты). Попробуйте ещё раз.');
        } else {
          addMessage('bot', 'Извините, произошла ошибка соединения. Попробуйте ещё раз.');
        }

        console.error('Chat error:', err);
      } finally {
        isLoading = false;
        sendBtn.disabled = false;
        inputEl.disabled = false;
        inputEl.focus();
      }
    }

    // Focus input on load
    inputEl.focus();
  })();
</script>

</body>
</html>
