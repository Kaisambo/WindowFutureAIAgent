<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Окна Будущего — Онлайн-консультант</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 50%, #1e40af 100%);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chat-container {
      width: 100%;
      max-width: 520px;
      height: 100vh;
      background: #fff;
      display: flex;
      flex-direction: column;
      box-shadow: 0 25px 60px rgba(0,0,0,0.3);
    }

    /* Header */
    .chat-header {
      background: linear-gradient(135deg, #1e3a5f, #2563eb);
      color: #fff;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .chat-header-icon {
      width: 46px; height: 46px;
      background: rgba(255,255,255,0.15);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .chat-header-text h1 { font-size: 1.1em; font-weight: 600; }
    .chat-header-text p  { font-size: 0.78em; opacity: 0.8; margin-top: 2px; }

    /* Messages */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #f8fafc;
    }

    .msg {
      max-width: 82%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 0.92em;
      line-height: 1.55;
      word-wrap: break-word;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.bot {
      align-self: flex-start;
      background: #e8f0fe;
      color: #1e293b;
      border-bottom-left-radius: 4px;
    }

    .msg.bot img {
      max-width: 100%;
      border-radius: 10px;
      margin-top: 8px;
      display: block;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .msg.bot img:hover {
      transform: scale(1.02);
    }

    .msg.user {
      align-self: flex-end;
      background: #2563eb;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    /* Typing indicator */
    .msg.typing {
      display: flex;
      gap: 5px;
      padding: 12px 18px;
    }

    .msg.typing span {
      width: 8px; height: 8px;
      background: #94a3b8;
      border-radius: 50%;
      animation: blink 1.4s infinite both;
    }

    .msg.typing span:nth-child(2) { animation-delay: 0.2s; }
    .msg.typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    /* Input area */
    .chat-input-area {
      padding: 12px 14px;
      border-top: 1px solid #e2e8f0;
      background: #fff;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    .chat-input-area textarea {
      flex: 1;
      border: 1.5px solid #e2e8f0;
      border-radius: 22px;
      padding: 10px 16px;
      font-size: 0.92em;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 120px;
      min-height: 42px;
      line-height: 1.4;
      transition: border-color 0.2s;
    }

    .chat-input-area textarea:focus {
      border-color: #2563eb;
    }

    .chat-input-area textarea::placeholder {
      color: #94a3b8;
    }

    .send-btn {
      width: 42px; height: 42px;
      border: none;
      background: #2563eb;
      color: #fff;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .send-btn:hover { background: #1d4ed8; }
    .send-btn:disabled { background: #94a3b8; cursor: not-allowed; }

    .send-btn svg { width: 20px; height: 20px; }

    /* Desktop */
    @media (min-width: 900px) {
      body { padding: 24px; }
      .chat-container {
        height: calc(100vh - 48px);
        border-radius: 16px;
        overflow: hidden;
      }
    }

    /* Mobile full-screen */
    @media (max-width: 520px) {
      .chat-container { max-width: 100%; }
    }
  </style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">
    <div class="chat-header-icon">🪟</div>
    <div class="chat-header-text">
      <h1>Окна Будущего</h1>
      <p>Окна, двери, балконы, мебель на заказ</p>
    </div>
  </div>

  <div class="chat-messages" id="messages"></div>

  <div class="chat-input-area">
    <textarea id="input" rows="1" placeholder="Напишите ваш вопрос..." autocomplete="off"></textarea>
    <button class="send-btn" id="sendBtn" title="Отправить">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>

<script>
(function() {
  const WEBHOOK_URL = 'https://n8n.orbitai.ru/webhook/0a536852-5986-40fc-8ebe-b526e469d193/chat';
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');

  // Generate unique session ID
  let sessionId = sessionStorage.getItem('chat_session_id');
  if (!sessionId) {
    sessionId = 'sess_' + Date.now() + '_' + Math.random().toString(36).slice(2, 10);
    sessionStorage.setItem('chat_session_id', sessionId);
  }

  let isLoading = false;

  // Show initial bot message
  addMessage('bot', 'Здравствуйте! Меня зовут Степан, менеджер компании «Окна Будущего». Какой у вас вопрос?');

  // Auto-resize textarea
  inputEl.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });

  // Send on Enter (Shift+Enter for new line)
  inputEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);

  function renderMarkdown(text) {
    // Render markdown images: ![alt](url)
    let html = text.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, function(match, alt, url) {
      return '<img src="' + url + '" alt="' + alt + '" loading="lazy" onclick="window.open(this.src,\'_blank\')">';
    });
    // Render markdown links: [text](url)
    html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" style="color:#2563eb">$1</a>');
    // Render bold: **text**
    html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    // Line breaks
    html = html.replace(/\n/g, '<br>');
    return html;
  }

  function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    if (role === 'bot') {
      div.innerHTML = renderMarkdown(text);
    } else {
      div.textContent = text;
    }
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'msg bot typing';
    div.id = 'typing';
    div.innerHTML = '<span></span><span></span><span></span>';
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function hideTyping() {
    const el = document.getElementById('typing');
    if (el) el.remove();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isLoading) return;

    // Show user message
    addMessage('user', text);
    inputEl.value = '';
    inputEl.style.height = 'auto';

    // Disable input
    isLoading = true;
    sendBtn.disabled = true;
    inputEl.disabled = true;

    showTyping();

    try {
      const response = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          action: 'sendMessage',
          chatInput: text,
          sessionId: sessionId
        })
      });

      hideTyping();

      if (!response.ok) {
        throw new Error('Ошибка сервера: ' + response.status);
      }

      const data = await response.json();

      // n8n chat trigger returns { output: "..." }
      const botText = data.output || data.text || data.response || JSON.stringify(data);
      addMessage('bot', botText);

    } catch (err) {
      hideTyping();
      addMessage('bot', 'Извините, произошла ошибка соединения. Попробуйте ещё раз.');
      console.error('Chat error:', err);
    } finally {
      isLoading = false;
      sendBtn.disabled = false;
      inputEl.disabled = false;
      inputEl.focus();
    }
  }

  // Focus input on load
  inputEl.focus();
})();
</script>

</body>
</html>
