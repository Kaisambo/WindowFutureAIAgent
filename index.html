<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Окна Будущего — Онлайн-консультант</title>
  <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />
  <style>
    :root {
      /* Brand colors */
      --chat--color-primary: #2563eb;
      --chat--color-primary-shade-50: #1d4ed8;
      --chat--color-primary-shade-100: #1e40af;
      --chat--color-secondary: #f0f7ff;
      --chat--color-secondary-shade-50: #e0efff;
      --chat--color-white: #ffffff;
      --chat--color-light: #f8fafc;
      --chat--color-light-shade-50: #f1f5f9;
      --chat--color-medium: #94a3b8;
      --chat--color-dark: #1e293b;
      --chat--color-disabled: #cbd5e1;
      --chat--color-typing: #94a3b8;

      /* Widget sizing */
      --chat--window--width: 100%;
      --chat--window--height: 100vh;

      --chat--header-height: auto;
      --chat--heading--font-size: 1.2em;
      --chat--subtitle--font-size: 0.85em;
      --chat--textarea--height: 50px;

      --chat--message--font-size: 0.95em;
      --chat--message--padding: 0.7em 1em;
      --chat--message--border-radius: 1em;

      --chat--message--bot--background: var(--chat--color-secondary);
      --chat--message--bot--color: var(--chat--color-dark);
      --chat--message--user--background: var(--chat--color-primary);
      --chat--message--user--color: var(--chat--color-white);

      --chat--toggle--background: var(--chat--color-primary);
      --chat--toggle--hover--background: var(--chat--color-primary-shade-50);
      --chat--toggle--active--background: var(--chat--color-primary-shade-100);

      --chat--input--background: var(--chat--color-white);
      --chat--input--border: 1px solid #e2e8f0;
      --chat--input--border-active: 1px solid var(--chat--color-primary);

      --chat--button--background: var(--chat--color-primary);
      --chat--button--hover--background: var(--chat--color-primary-shade-50);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 50%, #1e40af 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .page-container {
      width: 100%;
      max-width: 800px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: white;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }

    .brand-header {
      background: linear-gradient(135deg, #1e3a5f, #2563eb);
      color: white;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .brand-logo {
      width: 48px;
      height: 48px;
      background: rgba(255,255,255,0.15);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }

    .brand-info h1 {
      font-size: 1.15em;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .brand-info p {
      font-size: 0.8em;
      opacity: 0.85;
    }

    .chat-wrapper {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    /* Override n8n chat styles for full-page mode */
    #n8n-chat {
      width: 100% !important;
      height: 100% !important;
    }

    /* Hide the default toggle button */
    .n8n-chat .chat-toggle {
      display: none !important;
    }

    /* Make chat window fill container */
    .n8n-chat .chat-window {
      position: absolute !important;
      top: 0 !important;
      left: 0 !important;
      right: 0 !important;
      bottom: 0 !important;
      width: 100% !important;
      height: 100% !important;
      max-height: 100% !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      display: flex !important;
      flex-direction: column !important;
    }

    /* Hide default header since we have our own */
    .n8n-chat .chat-header {
      display: none !important;
    }

    /* Messages area */
    .n8n-chat .chat-messages-list {
      flex: 1;
      padding: 16px 20px;
    }

    /* Input area */
    .n8n-chat .chat-input {
      border-top: 1px solid #e2e8f0;
      padding: 12px 16px;
    }

    .n8n-chat .chat-input textarea {
      border-radius: 24px;
      padding: 10px 16px;
      font-size: 0.95em;
      resize: none;
    }

    .n8n-chat .chat-input .chat-input-send-button {
      background: var(--chat--color-primary);
      border-radius: 50%;
      width: 40px;
      height: 40px;
    }

    /* Message bubbles */
    .n8n-chat .chat-message-markdown {
      line-height: 1.5;
    }

    /* Mobile */
    @media (max-width: 768px) {
      .page-container {
        max-width: 100%;
        border-radius: 0;
      }

      .brand-header {
        padding: 12px 16px;
      }

      .brand-logo {
        width: 40px;
        height: 40px;
        font-size: 20px;
      }

      .brand-info h1 {
        font-size: 1em;
      }
    }

    /* Desktop wider screens */
    @media (min-width: 1200px) {
      body {
        padding: 24px;
      }

      .page-container {
        height: calc(100vh - 48px);
        border-radius: 16px;
        overflow: hidden;
      }
    }
  </style>
</head>
<body>
  <div class="page-container">
    <div class="brand-header">
      <div class="brand-logo">🪟</div>
      <div class="brand-info">
        <h1>Окна Будущего</h1>
        <p>Окна, двери, балконы, мебель на заказ</p>
      </div>
    </div>
    <div class="chat-wrapper">
      <div id="n8n-chat"></div>
    </div>
  </div>

  <script type="module">
    import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';

    createChat({
      target: '#n8n-chat',
      mode: 'fullscreen',
      webhookUrl: 'https://n8n.orbitai.ru/webhook/0a536852-5986-40fc-8ebe-b526e469d193/chat',
      initialMessages: [
        'Здравствуйте! Меня зовут Степан, менеджер компании «Окна Будущего». Какой у вас вопрос?'
      ],
      i18n: {
        ru: {
          title: '',
          subtitle: '',
          inputPlaceholder: 'Напишите ваш вопрос...',
          getStarted: 'Начать диалог',
          closeButtonTooltip: 'Закрыть',
        },
      },
      defaultLanguage: 'ru',
      showWelcomeScreen: false,
      chatInputKey: 'chatInput',
      metadata: {},
    });
  </script>
</body>
</html>
